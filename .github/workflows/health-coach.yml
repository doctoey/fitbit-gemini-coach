# .github/workflows/health-coach.yml
# ─────────────────────────────────────────────────────────────────
# AI Health Coach — GitHub Actions Scheduled Workflow
# ตั้งรัน 09:45 น. เวลาไทย (02:45 UTC) เพื่อส่งรายงานถึง Discord ประมาณ 10:00 น.
# ─────────────────────────────────────────────────────────────────

name: 🏃 Daily Health Coach Report

on:
  # ─── Scheduled trigger ────────────────────────────────────────
  schedule:
    # รันตอน 09:45 น. เวลาไทย (02:45 UTC) เผื่อคิว GitHub Actions เพื่อให้ส่งจริงช่วง 10:00 น. ต้นๆ
    - cron: "45 2 * * *"

  # ─── Manual trigger (ทดสอบรันตามต้องการ) ─────────────────────
  workflow_dispatch:
    inputs:
      reason:
        description: "เหตุผลที่รันด้วยตนเอง (optional)"
        required: false
        default: "Manual test run"

  # ─── Push trigger: push ไปที่ branch 'test' เพื่อทดสอบ ────────
  push:
    branches:
      - test

# ─── Concurrency: ป้องกัน workflow ซ้อนกันรัน ───────────────────
concurrency:
  group: health-coach-daily
  cancel-in-progress: false   # ไม่ยกเลิก run ที่กำลังทำงานอยู่

jobs:
  run-health-coach:
    name: 📊 Fetch, Analyze & Report
    runs-on: ubuntu-latest
    timeout-minutes: 10  # กัน stuck ไม่เกิน 10 นาที

    steps:
      # ─── Step 1: Checkout code ──────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ─── Step 1.1: Calculate Bangkok Date ───────────────────────
      - name: 📅 Get current date in Bangkok
        id: date
        run: |
          echo "today=$(TZ='Asia/Bangkok' date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "hour=$(TZ='Asia/Bangkok' date +'%H')" >> $GITHUB_OUTPUT

      # ─── Step 1.2: Restore Success Cache ────────────────────────
      - name: 🔍 Check success cache for today
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: .health-coach-success
          key: health-coach-success-${{ steps.date.outputs.today }}

      # ─── Step 1.3: Determine if last attempt ────────────────────
      - name: ⚙️ Determine if last attempt
        if: steps.cache.outputs.cache-hit != 'true'
        id: attempt
        run: |
          # เนื่องจากรันรอบเดียวตอน 09:45 น. ให้ตั้งค่าเป็น LAST_ATTEMPT=true เสมอเพื่อดึงข้อมูลส่งทันที
          echo "LAST_ATTEMPT=true" >> $GITHUB_ENV
          echo "Is last attempt: true"

      # ─── Step 2: Setup Node.js ──────────────────────────────────
      - name: ⚙️ Setup Node.js 22
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"   # ใช้ LTS ล่าสุด (v20 deprecated แล้ว)
          cache: "npm"         # cache node_modules ให้เร็วขึ้น

      # ─── Step 3: Install dependencies ───────────────────────────
      - name: 📦 Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci  # ใช้ ci แทน install เพื่อ reproducible build

      # ─── Step 4: Run Unit Tests ─────────────────────────────────
      - name: 🧪 Run Unit Tests
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm test

      # ─── Step 5: Type-check & Build TypeScript ──────────────────
      - name: 🔨 Build TypeScript
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm run build

      # ─── Step 6: Run Health Coach ───────────────────────────────
      - name: 🏃 Run AI Health Coach
        if: steps.cache.outputs.cache-hit != 'true'
        id: health_coach
        run: npm start
        env:
          # ── Google OAuth ─────────────────────────────────────────
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:  ${{ secrets.GOOGLE_REFRESH_TOKEN }}

          # ── Gemini AI ────────────────────────────────────────────
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}

          # ── Discord ──────────────────────────────────────────────
          DISCORD_WEBHOOK_URL:   ${{ secrets.DISCORD_WEBHOOK_URL }}

          # ── App Config ───────────────────────────────────────────
          TIMEZONE:  "Asia/Bangkok"
          NODE_ENV:  "production"
          LAST_ATTEMPT: ${{ env.LAST_ATTEMPT }}

      # ─── Step 6.1: Save success cache ───────────────────────────
      - name: 💾 Save success cache for today
        if: steps.cache.outputs.cache-hit != 'true' && steps.health_coach.outputs.should_cache == 'true'
        uses: actions/cache/save@v4
        with:
          path: .health-coach-success
          key: health-coach-success-${{ steps.date.outputs.today }}

      # ─── Step 7: GitHub Step Summary ────────────────────────────
      # แสดงผลสรุปใน Actions UI → Actions tab → เลือก run → Summary
      - name: 📋 Write Job Summary
        if: always() && steps.cache.outputs.cache-hit != 'true'
        run: |
          STATUS="${{ steps.health_coach.outcome }}"
          if [ "$STATUS" = "success" ]; then
            ICON="✅"
          else
            ICON="❌"
          fi

          echo "## ${ICON} AI Health Coach — Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[🔗 View full log](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

      # ─── Step 7.1: Show Cache Hit Info ──────────────────────────
      - name: 📋 Show Cache Hit Info
        if: always() && steps.cache.outputs.cache-hit == 'true'
        run: |
          echo "## ✅ AI Health Coach — Already Succeeded Today" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "วันนี้มีการส่งรายงานสำเร็จเรียบร้อยแล้ว (ตรวจพบ Cache: \`health-coach-success-${{ steps.date.outputs.today }}\`)" >> $GITHUB_STEP_SUMMARY
          echo "ระบบข้ามการทำงานรอบนี้เพื่อประหยัดโควตาการรัน" >> $GITHUB_STEP_SUMMARY

      # ─── Step 8: Notify on failure ──────────────────────────────
      - name: 🚨 Notify Discord on failure
        if: failure() && steps.cache.outputs.cache-hit != 'true'
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"username\": \"🏃 AI Health Coach\",
              \"embeds\": [{
                \"title\": \"🚨 Workflow ล้มเหลว! Run #${{ github.run_number }}\",
                \"description\": \"กรุณาตรวจสอบ [Actions log](<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}>)\",
                \"color\": 15158332,
                \"fields\": [
                  { \"name\": \"Trigger\", \"value\": \"${{ github.event_name }}\", \"inline\": true },
                  { \"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true }
                ],
                \"footer\": { \"text\": \"${{ github.repository }}\" }
              }]
            }"

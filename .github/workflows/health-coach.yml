# .github/workflows/health-coach.yml
# ─────────────────────────────────────────────────────────────────
# AI Health Coach — GitHub Actions Scheduled Workflow
# รันทุกวัน 09:00 น. เวลาไทย (UTC+7 = 02:00 UTC)
#
# ⚠️  GitHub cron อาจ delay ได้หลายชั่วโมงในช่วง load สูง
# ⚠️  Repo ที่ไม่มี push นาน 60 วัน จะถูก disable scheduled workflow อัตโนมัติ
# ─────────────────────────────────────────────────────────────────

name: 🏃 Daily Health Coach Report

on:
  # ─── Scheduled trigger ────────────────────────────────────────
  schedule:
    # 09:00 Asia/Bangkok (UTC+7) = 02:00 UTC
    # หมายเหตุ: GitHub ไม่รับประกันเวลาแน่นอน อาจ delay ได้ถึง 1 ชั่วโมง
    - cron: "0 2 * * *"

  # ─── Manual trigger (ทดสอบรันตามต้องการ) ─────────────────────
  workflow_dispatch:
    inputs:
      reason:
        description: "เหตุผลที่รันด้วยตนเอง (optional)"
        required: false
        default: "Manual test run"

  # ─── Push trigger: push ไปที่ branch 'test' เพื่อทดสอบ ────────
  # วิธีใช้: git push origin main:test
  # จะ trigger workflow ทันที ไม่ต้องรอ cron
  push:
    branches:
      - test

# ─── Concurrency: ป้องกัน workflow ซ้อนกันรัน ───────────────────
concurrency:
  group: health-coach-daily
  cancel-in-progress: false   # ไม่ยกเลิก run ที่กำลังทำงานอยู่

jobs:
  run-health-coach:
    name: 📊 Fetch, Analyze & Report
    runs-on: ubuntu-latest
    timeout-minutes: 10  # กัน stuck ไม่เกิน 10 นาที

    steps:
      # ─── Step 1: Checkout code ──────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ─── Step 2: Setup Node.js ──────────────────────────────────
      - name: ⚙️ Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"   # ใช้ LTS ล่าสุด (v20 deprecated แล้ว)
          cache: "npm"         # cache node_modules ให้เร็วขึ้น

      # ─── Step 3: Install dependencies ───────────────────────────
      - name: 📦 Install dependencies
        run: npm ci  # ใช้ ci แทน install เพื่อ reproducible build

      # ─── Step 4: Run Unit Tests ─────────────────────────────────
      - name: 🧪 Run Unit Tests
        run: npm test

      # ─── Step 5: Type-check & Build TypeScript ──────────────────
      - name: 🔨 Build TypeScript
        run: npm run build

      # ─── Step 6: Run Health Coach ───────────────────────────────
      - name: 🏃 Run AI Health Coach
        id: health_coach
        run: npm start
        env:
          # ── Google OAuth ─────────────────────────────────────────
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:  ${{ secrets.GOOGLE_REFRESH_TOKEN }}

          # ── Gemini AI ────────────────────────────────────────────
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}

          # ── Discord ──────────────────────────────────────────────
          DISCORD_WEBHOOK_URL:   ${{ secrets.DISCORD_WEBHOOK_URL }}

          # ── App Config ───────────────────────────────────────────
          TIMEZONE:  "Asia/Bangkok"
          NODE_ENV:  "production"

      # ─── Step 7: GitHub Step Summary ────────────────────────────
      # แสดงผลสรุปใน Actions UI → Actions tab → เลือก run → Summary
      - name: 📋 Write Job Summary
        if: always()
        run: |
          STATUS="${{ steps.health_coach.outcome }}"
          if [ "$STATUS" = "success" ]; then
            ICON="✅"
          else
            ICON="❌"
          fi

          echo "## ${ICON} AI Health Coach — Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[🔗 View full log](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

      # ─── Step 8: Notify on failure ──────────────────────────────
      - name: 🚨 Notify Discord on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"username\": \"🏃 AI Health Coach\",
              \"embeds\": [{
                \"title\": \"🚨 Workflow ล้มเหลว! Run #${{ github.run_number }}\",
                \"description\": \"กรุณาตรวจสอบ [Actions log](<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}>)\",
                \"color\": 15158332,
                \"fields\": [
                  { \"name\": \"Trigger\", \"value\": \"${{ github.event_name }}\", \"inline\": true },
                  { \"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true }
                ],
                \"footer\": { \"text\": \"${{ github.repository }}\" }
              }]
            }"

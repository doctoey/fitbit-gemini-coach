# .github/workflows/health-coach.yml
# ─────────────────────────────────────────────────────────────────
# AI Health Coach — GitHub Actions Scheduled Workflow
# รันทุกวัน 09:00 น. เวลาไทย (UTC+7 = 02:00 UTC)
# ─────────────────────────────────────────────────────────────────

name: 🏃 Daily Health Coach Report

on:
  # ─── Scheduled trigger ────────────────────────────────────────
  schedule:
    # 09:00 Asia/Bangkok (UTC+7) = 02:00 UTC
    # Format: นาที ชั่วโมง วัน เดือน วันในสัปดาห์
    - cron: "0 2 * * *"

  # ─── Manual trigger (ทดสอบรันตามต้องการ) ─────────────────────
  workflow_dispatch:
    inputs:
      reason:
        description: "เหตุผลที่รันด้วยตนเอง (optional)"
        required: false
        default: "Manual test run"

# ─── Concurrency: ป้องกัน workflow ซ้อนกันรัน ───────────────────
concurrency:
  group: health-coach-daily
  cancel-in-progress: false

jobs:
  run-health-coach:
    name: 📊 Fetch, Analyze & Report
    runs-on: ubuntu-latest
    timeout-minutes: 10  # กัน stuck ไม่เกิน 10 นาที

    steps:
      # ─── Step 1: Checkout code ──────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ─── Step 2: Setup Node.js ──────────────────────────────────
      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"   # cache node_modules ให้เร็วขึ้น

      # ─── Step 3: Install dependencies ───────────────────────────
      - name: 📦 Install dependencies
        run: npm ci    # ใช้ ci แทน install เพื่อ reproducible build

      # ─── Step 4: Type-check & Build TypeScript ──────────────────
      - name: 🔨 Build TypeScript
        run: npm run build

      # ─── Step 5: Run Health Coach ───────────────────────────────
      - name: 🏃 Run AI Health Coach
        run: npm start
        env:
          # ── Google OAuth ─────────────────────────────────────────
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}

          # ── Gemini AI ────────────────────────────────────────────
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

          # ── Discord ──────────────────────────────────────────────
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

          # ── App Config ───────────────────────────────────────────
          TIMEZONE: "Asia/Bangkok"
          NODE_ENV: "production"

      # ─── Step 6: Notify on failure ──────────────────────────────
      - name: 🚨 Notify Discord on workflow failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "username": "🏃 AI Health Coach",
              "embeds": [{
                "title": "⚠️ GitHub Actions Workflow ล้มเหลว",
                "description": "Workflow รันไม่สำเร็จ กรุณาตรวจสอบ [Actions log](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})",
                "color": 15158332,
                "footer": { "text": "Run #${{ github.run_number }} • ${{ github.repository }}" }
              }]
            }'
